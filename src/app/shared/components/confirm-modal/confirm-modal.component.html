<div class="modal-overlay"
     *ngIf="visivel"
     (click)="close()">

  <div class="modal-box"
       (click)="$event.stopPropagation()">

    <div class="modal-box__icon">
      <span>🗑️</span>
    </div>

    <p class="modal-box__title">
      {{ config.titulo }}
    </p>

    <p class="modal-box__sub">
      Tem certeza que deseja remover<br>

      <strong>{{ config.nomeAlvo }}</strong>?<br>

      <small>{{ config.mensagem }}</small>
    </p>

    <div class="modal-box__actions">

      <button class="btn btn--outline"
              (click)="close()">
        Cancelar
      </button>

      <button class="btn btn--danger"
              (click)="confirm()">
        Sim, remover
      </button>

    </div>

  </div>

</div>
